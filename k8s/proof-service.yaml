apiVersion: apps/v1
kind: Deployment
metadata:
  name: proof-service
  namespace: erasegraph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proof-service
  template:
    metadata:
      labels:
        app: proof-service
    spec:
      containers:
        - name: proof-service
          image: aaronshan2635088459/erasegraph-proof-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3004
          envFrom:
            - configMapRef:
                name: erasegraph-config
          env:
            - name: PORT
              value: "3004"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erasegraph-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: proof-service
  namespace: erasegraph
spec:
  selector:
    app: proof-service
  ports:
    - port: 3004
      targetPort: 3004
