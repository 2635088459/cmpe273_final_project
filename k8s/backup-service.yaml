apiVersion: apps/v1
kind: Deployment
metadata:
  name: backup-service
  namespace: erasegraph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backup-service
  template:
    metadata:
      labels:
        app: backup-service
    spec:
      containers:
        - name: backup-service
          image: aaronshan2635088459/erasegraph-backup-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
          envFrom:
            - configMapRef:
                name: erasegraph-config
          env:
            - name: PORT
              value: "3005"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backup-service
  namespace: erasegraph
spec:
  selector:
    app: backup-service
  ports:
    - port: 3005
      targetPort: 3005
