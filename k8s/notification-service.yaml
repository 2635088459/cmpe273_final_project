apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: erasegraph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: infra-notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3010
          envFrom:
            - configMapRef:
                name: erasegraph-config
          env:
            - name: PORT
              value: "3010"
          readinessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: erasegraph
spec:
  selector:
    app: notification-service
  ports:
    - port: 3010
      targetPort: 3010
