apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-cleanup-service
  namespace: erasegraph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-cleanup-service
  template:
    metadata:
      labels:
        app: analytics-cleanup-service
    spec:
      containers:
        - name: analytics-cleanup-service
          image: infra-analytics-cleanup-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3009
          envFrom:
            - configMapRef:
                name: erasegraph-config
          env:
            - name: PORT
              value: "3009"
          readinessProbe:
            httpGet:
              path: /health
              port: 3009
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3009
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-cleanup-service
  namespace: erasegraph
spec:
  selector:
    app: analytics-cleanup-service
  ports:
    - port: 3009
      targetPort: 3009
