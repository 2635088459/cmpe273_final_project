apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-cleanup-service
  namespace: erasegraph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: search-cleanup-service
  template:
    metadata:
      labels:
        app: search-cleanup-service
    spec:
      containers:
        - name: search-cleanup-service
          image: aaronshan2635088459/erasegraph-search-cleanup-service:richer-proof-20260508-1
          imagePullPolicy: Always
          ports:
            - containerPort: 3008
          envFrom:
            - configMapRef:
                name: erasegraph-config
          env:
            - name: PORT
              value: "3008"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erasegraph-secrets
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3008
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: search-cleanup-service
  namespace: erasegraph
spec:
  selector:
    app: search-cleanup-service
  ports:
    - port: 3008
      targetPort: 3008
