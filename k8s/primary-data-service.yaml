apiVersion: apps/v1
kind: Deployment
metadata:
  name: primary-data-service
  namespace: erasegraph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: primary-data-service
  template:
    metadata:
      labels:
        app: primary-data-service
    spec:
      containers:
        - name: primary-data-service
          image: infra-primary-data-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: erasegraph-config
          env:
            - name: PORT
              value: "3002"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erasegraph-secrets
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: primary-data-service
  namespace: erasegraph
spec:
  selector:
    app: primary-data-service
  ports:
    - port: 3002
      targetPort: 3002
