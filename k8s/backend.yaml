apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: erasegraph
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics/prometheus"
        prometheus.io/port: "3001"
    spec:
      containers:
        - name: backend
          image: aaronshan2635088459/erasegraph-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: erasegraph-config
          env:
            - name: PORT
              value: "3001"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erasegraph-secrets
                  key: DB_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: erasegraph
spec:
  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001
