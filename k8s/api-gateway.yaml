apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: erasegraph
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: aaronshan2635088459/erasegraph-api-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: BACKEND_URL
              value: "http://backend:3001"
            - name: SERVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: erasegraph-secrets
                  key: SERVICE_TOKEN
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: erasegraph
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
