# =============================================================
# EraseGraph Helm Chart — values.yaml
#
# Override any of these in a custom values file:
#   helm install erasegraph ./helm/erasegraph -f my-values.yaml
#
# Common overrides:
#   --set backend.replicaCount=3
#   --set images.tag=v1.2.0
#   --set secrets.dbPassword=mySecret
# =============================================================

# ---------------------------------------------------------------------------
# Namespace
# ---------------------------------------------------------------------------
namespace: erasegraph

# ---------------------------------------------------------------------------
# Image settings
# All application images share the same tag (built by docker compose build).
# Infrastructure images (postgres, redis, etc.) use their own fixed versions.
# ---------------------------------------------------------------------------
images:
  tag: latest
  pullPolicy: Always
  backend:              aaronshan2635088459/erasegraph-backend
  frontend:             aaronshan2635088459/erasegraph-frontend
  apiGateway:           aaronshan2635088459/erasegraph-api-gateway
  primaryData:          aaronshan2635088459/erasegraph-primary-data-service
  cacheCleanup:         aaronshan2635088459/erasegraph-cache-cleanup-service
  proofService:         aaronshan2635088459/erasegraph-proof-service
  backupService:        aaronshan2635088459/erasegraph-backup-service
  analyticsCleanup:     aaronshan2635088459/erasegraph-analytics-cleanup-service
  searchCleanup:        aaronshan2635088459/erasegraph-search-cleanup-service
  notificationService:  aaronshan2635088459/erasegraph-notification-service

# ---------------------------------------------------------------------------
# Replica counts (override per environment)
# ---------------------------------------------------------------------------
replicaCount:
  backend:          2   # 2 replicas demonstrates HA / pod self-healing
  frontend:         1
  primaryData:      1
  cacheCleanup:     1
  proofService:     1
  backupService:    1

# ---------------------------------------------------------------------------
# Secrets  (base values — override in production with real secrets!)
# ---------------------------------------------------------------------------
# WARNING: Replace these with real secrets before deploying to a cloud cluster.
# Never commit production credentials to version control.
secrets:
  dbPassword:       "Xp9kR7mL2qNvBs4T"
  postgresPassword: "Xp9kR7mL2qNvBs4T"
  rabbitmqPassword: "Wj5dF3hY8cPnAt6Z"

# ---------------------------------------------------------------------------
# Application ConfigMap
# ---------------------------------------------------------------------------
config:
  nodeEnv:                  "production"
  dbHost:                   "postgres"
  dbPort:                   "5432"
  dbUsername:               "erasegraph"
  dbDatabase:               "erasegraph"
  redisUrl:                 "redis://redis:6379"
  rabbitmqUrl:              "amqp://erasegraph:Wj5dF3hY8cPnAt6Z@rabbitmq:5672"
  otlpTracesEndpoint:       "http://jaeger:4318/v1/traces"
  jaegerEndpoint:           "http://jaeger:14268/api/traces"
  simulateFailure:          "false"
  primaryDataServiceUrl:    "http://primary-data-service:3002"
  cacheCleanupServiceUrl:   "http://cache-cleanup-service:3003"
  proofServiceUrl:          "http://proof-service:3004"
  backupServiceUrl:         "http://backup-service:3005"

# ---------------------------------------------------------------------------
# Infrastructure images (pinned versions)
# ---------------------------------------------------------------------------
infra:
  postgres:
    image: postgres:16-alpine
    storage: 1Gi
  redis:
    image: redis:7-alpine
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
  jaeger:
    image: jaegertracing/all-in-one:1.54

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  host: erasegraph.local
  className: nginx
