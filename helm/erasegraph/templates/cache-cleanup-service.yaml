apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-cleanup-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "erasegraph.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.cacheCleanup }}
  selector:
    matchLabels:
      app: cache-cleanup-service
  template:
    metadata:
      labels:
        app: cache-cleanup-service
    spec:
      containers:
        - name: cache-cleanup-service
          image: {{ .Values.images.cacheCleanup }}:{{ .Values.images.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: erasegraph-config
          env:
            - name: PORT
              value: "3003"
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: cache-cleanup-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "erasegraph.labels" . | nindent 4 }}
spec:
  selector:
    app: cache-cleanup-service
  ports:
    - port: 3003
      targetPort: 3003
