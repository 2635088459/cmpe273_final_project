apiVersion: apps/v1
kind: Deployment
metadata:
  name: proof-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "erasegraph.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount.proofService }}
  selector:
    matchLabels:
      app: proof-service
  template:
    metadata:
      labels:
        app: proof-service
    spec:
      containers:
        - name: proof-service
          image: {{ .Values.images.proofService }}:{{ .Values.images.tag }}
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          ports:
            - containerPort: 3004
          envFrom:
            - configMapRef:
                name: erasegraph-config
          env:
            - name: PORT
              value: "3004"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: erasegraph-secrets
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: proof-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "erasegraph.labels" . | nindent 4 }}
spec:
  selector:
    app: proof-service
  ports:
    - port: 3004
      targetPort: 3004
